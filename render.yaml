services:
  - type: web
    name: sh-erp-backend
    runtime: node
    region: singapore
    rootDir: wms-backend
    buildCommand: npm install --include=dev && npm run build
    startCommand: npm run migration:run && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api
