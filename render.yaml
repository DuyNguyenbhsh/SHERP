services:
  # === BACKEND (NestJS API) ===
  - type: web
    name: sh-erp-backend
    runtime: node
    region: singapore
    buildCommand: rm -rf node_modules wms-backend/node_modules wms-frontend/node_modules package-lock.json && npm install --include=dev && npm run build:backend
    startCommand: cd wms-backend && npx typeorm-ts-node-commonjs migration:run -d src/typeorm-data-source.ts && node dist/main.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1d
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FRONTEND_URL
        sync: false
    healthCheckPath: /api

  # === FRONTEND (React Static Site) ===
  - type: web
    name: sh-erp-frontend
    runtime: static
    region: singapore
    buildCommand: rm -rf node_modules wms-backend/node_modules wms-frontend/node_modules package-lock.json && npm install --include=dev && npm run build:frontend
    staticPublishPath: wms-frontend/dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_BASE_URL
        sync: false
