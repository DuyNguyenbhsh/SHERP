name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ─────────────────────────────────────────────────────────
  # BACKEND — Lint + Test + Build
  # ─────────────────────────────────────────────────────────
  backend:
    name: Backend (NestJS)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms-backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wms-backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Unit tests
        run: npm test -- --passWithNoTests
        env:
          NODE_ENV: test
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/sherp_test
          JWT_SECRET: test-secret-that-is-at-least-32-chars-long-for-ci

      - name: Build
        run: npm run build

  # ─────────────────────────────────────────────────────────
  # FRONTEND — Lint + Type-check + Build
  # ─────────────────────────────────────────────────────────
  frontend:
    name: Frontend (React/Vite)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: wms-frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: wms-frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npm run type-check

      - name: Build
        run: npm run build
        env:
          VITE_API_URL: /api

  # ─────────────────────────────────────────────────────────
  # DOCS CHECK — 5-Gate documentation gate
  # ─────────────────────────────────────────────────────────
  docs-gate:
    name: 5-Gate Docs Check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verify mandatory docs exist
        run: |
          set -e
          missing=0
          for f in docs/features/*/BA_SPEC.md; do
            dir=$(dirname "$f")
            if [ ! -f "$dir/SA_DESIGN.md" ]; then
              echo "::warning::Missing SA_DESIGN.md for $(basename "$dir") — Gate 2 incomplete"
              missing=$((missing + 1))
            fi
          done
          if [ "$missing" -gt 0 ]; then
            echo "$missing feature(s) missing SA_DESIGN.md — see warnings above"
          fi
